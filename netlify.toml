[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/v1/gold-rates/chennai"
  to = "/.netlify/functions/gold-rates-chennai"
  status = 200

[[redirects]]
  from = "/api/cron/gold-rates-sync"
  to = "/.netlify/functions/gold-rates-sync"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
